<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anushri, From Your Irritating Friend 💝</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--background-color-1:#ff9a9e;
--background-color-2:#fad0c4;
--button-color:#ff4d6d;
--button-hover:#ff758f;
--text-color:#fff;
}

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(45deg,var(--background-color-1),var(--background-color-2));
color:var(--text-color);
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
max-width:600px;
padding:20px;
}

h1{
font-family:"Dancing Script",cursive;
font-size:3rem;
}

.cute-btn{
padding:12px 22px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
background:var(--button-color);
color:white;
font-size:16px;
transition:0.3s;
}

.cute-btn:hover{
background:var(--button-hover);
}

.hidden{
display:none;
}

.slider{
width:80%;
}

.celebration{
margin-top:20px;
font-size:22px;
}
</style>
</head>

<body>

<div class="container">
<h1 id="valentineTitle">Hey Anushri 💝</h1>

<div class="music-controls">
<button id="musicToggle" class="cute-btn">🎵 Play Music</button>
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
</div>

<!-- Question 1 -->
<div id="question1">
<h2>Do you like your irritating friend?</h2>
<button class="cute-btn" onclick="showNextQuestion(2)">Yes 😄</button>
<button class="cute-btn" onclick="moveButton(this)">No 🙈</button>
</div>

<!-- Question 2 -->
<div id="question2" class="hidden">
<h2>How much do you like him?</h2>

<input type="range" min="0" max="100" value="50"
class="slider" id="loveMeter"
oninput="loveValue.innerText=this.value">

<p>Love Level: <span id="loveValue">50</span>%</p>

<button class="cute-btn" onclick="showNextQuestion(3)">Next ➜</button>
</div>

<!-- Question 3 -->
<div id="question3" class="hidden">
<h2>Will you stay friends forever?</h2>
<button class="cute-btn" onclick="celebrate()">Yes ❤️</button>
<button class="cute-btn" onclick="moveButton(this)">No 😜</button>
</div>

<!-- Celebration -->
<div id="celebration" class="celebration hidden">
<h2>Yay! 🎉</h2>
<p>Best irritating friendship confirmed 😆💖</p>
</div>

</div>

<script>
/* Theme config */
window.VALENTINE_CONFIG = {
colors:{
backgroundStart:"#ff9a9e",
backgroundEnd:"#fad0c4",
buttonBackground:"#ff4d6d",
buttonHover:"#ff758f",
textColor:"#ffffff"
}
};

function applyTheme(){
const c = window.VALENTINE_CONFIG.colors;
const root = document.documentElement;

root.style.setProperty('--background-color-1', c.backgroundStart);
root.style.setProperty('--background-color-2', c.backgroundEnd);
root.style.setProperty('--button-color', c.buttonBackground);
root.style.setProperty('--button-hover', c.buttonHover);
root.style.setProperty('--text-color', c.textColor);
}

window.addEventListener("DOMContentLoaded",applyTheme);

/* Music */
const musicBtn=document.getElementById("musicToggle");
const music=document.getElementById("bgMusic");

musicBtn.onclick=()=>{
if(music.paused){
music.play();
musicBtn.textContent="⏸ Pause Music";
}else{
music.pause();
musicBtn.textContent="🎵 Play Music";
}
};

/* Move No button */
function moveButton(btn){
btn.style.position="relative";
btn.style.left=Math.random()*200-100+"px";
btn.style.top=Math.random()*100-50+"px";
}

/* Navigation */
function showNextQuestion(n){
document.querySelectorAll("#question1,#question2,#question3")
.forEach(q=>q.classList.add("hidden"));

document.getElementById("question"+n).classList.remove("hidden");
}

/* Celebration */
function celebrate(){
document.getElementById("question3").classList.add("hidden");
document.getElementById("celebration").classList.remove("hidden");
}
</script>

</body>
</html>
