<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Rose Day, Buddy! 🌹</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NTPV468TNZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-NTPV468TNZ');
</script>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(to bottom, #fff3e0, #ffe0b2);
    color: #333;
    text-align: center;
    overflow-x: hidden;
}

/* Responsive container */
section {
    padding: 40px 15px;
    max-width: 600px;
    margin: auto;
}

/* Title animation */
h1 {
    font-size: 2.2em;
    margin: 10px;
    color: #e65100;
    text-shadow: 2px 2px 8px #ffb74d;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
}

.rose-container img {
    width: 80%;
    max-width: 300px;
    border-radius: 50%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    animation: spin 15s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.wishes {
    font-size: 1.2em;
    line-height: 1.6;
    margin-top: 25px;
}

.signature {
    font-size: 1.5em;
    color: #ef6c00;
    margin-top: 30px;
}

/* Music button */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #ff7043;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

/* Floating roses */
.floating {
    position: fixed;
    bottom: -40px;
    font-size: 24px;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}

/* Mobile optimization */
@media (max-width: 480px) {
    h1 { font-size: 1.8em; }
    .wishes { font-size: 1em; }
}
</style>
</head>

<body>

<section>
<button onclick="document.getElementById('music').play()">Play Music 🎵</button>

<audio id="music" loop>
    <source src="music1.mp3" type="audio/mpeg">
</audio>

<h1>Happy Rose Day, My Awesome Friend! 🌹</h1>

<div class="rose-container">
<img src="img.jpeg" alt="Bright cheerful roses">
</div>

<div class="wishes">
<p>Just dropping by with some friendly petals to say you're the best!</p>
<p>Thanks for the laughs and fun chaos!</p>
<p>May your day be full of smiles and zero stress!</p>
<p>You're one in a million — keep rocking! 🚀</p>
</div>

<div class="signature">
From your pal, Mounesh 🌟
</div>
</section>

<script>
/* Continuous floating roses */
function createRose() {
    const el = document.createElement("div");
    el.classList.add("floating");
    el.innerText = "🌹";
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 10000);
}

setInterval(createRose, 400);
</script>

</body>
</html>
